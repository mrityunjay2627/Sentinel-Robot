name: sentinel_robot
version: '1.0.0'
config-version: 2

profile: sentinel_robot

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  sentinel_robot:
    staging:
      +schema: staging
      +materialized: view
    dims:
      +schema: marts
      +materialized: table
    facts:
      +schema: marts
      +materialized: table
    marts:
      +schema: marts
      +materialized: table
