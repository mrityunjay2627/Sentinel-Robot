version: 2

models:
  - name: dim_robot_model
    description: Robot model dimension with one row per AMR model.
    columns:
      - name: robot_model_sk
        tests:
          - not_null
          - unique
      - name: model_id
        tests:
          - not_null
          - unique
      - name: model_name
        tests:
          - not_null

  - name: dim_zone
    description: Warehouse zone dimension.
    columns:
      - name: zone_sk
        tests:
          - not_null
          - unique
      - name: zone_id
        tests:
          - not_null
          - unique
      - name: zone_type
        tests:
          - accepted_values:
              arguments:
                values: ['STORAGE', 'PICKING', 'PACKING', 'CHARGING', 'TRANSIT', 'STAGING', 'SHIPPING', 'RECEIVING']

  - name: dim_date
    description: Calendar date dimension used for role-playing dates in facts.
    columns:
      - name: date_key
        tests:
          - not_null
          - unique
      - name: date_day
        tests:
          - not_null
          - unique


  - name: dim_robot
    description: SCD Type 2 robot dimension tracking zone, firmware, and owner team changes over time.
    columns:
      - name: robot_sk
        tests:
          - not_null
          - unique
      - name: robot_id
        tests:
          - not_null
      - name: model_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_robot_model')
                field: model_id
      - name: zone_id
        tests:
          - relationships:
              arguments:
                to: ref('dim_zone')
                field: zone_id
      - name: valid_from
        tests:
          - not_null
      - name: valid_to
        tests:
          - not_null