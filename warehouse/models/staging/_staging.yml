version: 2

models:
  - name: stg_sensor_readings
    description: Cleaned staging view for raw AMR sensor readings with data-quality flags.
    columns:
      - name: reading_id
        tests:
          - not_null
      - name: robot_id
        tests:
          - not_null
      - name: reading_ts_raw
        tests:
          - not_null
      - name: operational_status
        tests:
          - accepted_values:
              arguments:
                values: ['ACTIVE', 'IDLE', 'CHARGING', 'ERROR', 'MAINTENANCE', 'OFFLINE']

  - name: stg_robot_models
    description: Cleaned robot model dimension staging table.
    columns:
      - name: model_id
        tests:
          - not_null
          - unique
      - name: model_name
        tests:
          - not_null

  - name: stg_zones
    description: Cleaned warehouse zone staging table.
    columns:
      - name: zone_id
        tests:
          - not_null
          - unique
      - name: zone_type
        tests:
          - accepted_values:
              arguments:
                values: ['STORAGE', 'PICKING', 'PACKING', 'CHARGING', 'TRANSIT', 'STAGING', 'SHIPPING', 'RECEIVING']

  - name: stg_robots
    description: Cleaned robot master staging table.
    columns:
      - name: robot_id
        tests:
          - not_null
          - unique
      - name: model_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_robot_models')
                field: model_id
      - name: home_zone_id
        tests:
          - relationships:
              arguments:
                to: ref('stg_zones')
                field: zone_id

  - name: stg_robot_attribute_changes
    description: Cleaned robot attribute change events used to build SCD Type 2 robot dimension.
    columns:
      - name: change_id
        tests:
          - not_null
          - unique
      - name: robot_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_robots')
                field: robot_id
      - name: attribute
        tests:
          - accepted_values:
              arguments:
                values: ['FIRMWARE', 'ZONE', 'TEAM']

  - name: stg_tasks
    description: Lightly cleaned operational task events. Messy rows are preserved and flagged instead of filtered.
    columns:
      - name: task_type
        description: Raw normalized task type. Invalid values are flagged by is_invalid_task_type.
      - name: status
        description: Raw normalized task status. Invalid values are flagged by is_invalid_status.
      - name: is_missing_task_id
        tests:
          - not_null
      - name: is_missing_robot_id
        tests:
          - not_null
      - name: is_invalid_task_type
        tests:
          - not_null
      - name: is_invalid_status
        tests:
          - not_null
      - name: is_task_lifecycle_invalid
        tests:
          - not_null